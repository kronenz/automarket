<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카테고리 분석 — TrendRadar | AutoMarket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<style>
/* ── Category card specific ── */
.cat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
  transition: transform 0.18s, border-color 0.18s;
  cursor: default;
}
.cat-card:hover { transform: translateY(-2px); border-color: var(--border-light); }
.cat-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.cat-card-name {
  font-size: 15px; font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
}
.cat-card-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.cat-card-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.cat-big-num {
  font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700;
  letter-spacing: -1px; line-height: 1;
  margin-bottom: 4px;
}
.cat-num-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.cat-card-meta { display: flex; flex-direction: column; gap: 6px; }
.cat-meta-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
.cat-meta-label { color: var(--text-muted); }
.cat-meta-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; }
.cat-meta-kw { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <a class="logo" href="../../index.html">
      <div class="logo-icon">A</div>
      <span class="logo-text">Auto<span>Market</span></span>
    </a>
    <div class="topbar-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE &middot; 갱신 2분 전
      </div>
    </div>
  </header>

  <div class="body-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <nav class="sidebar-nav">

        <div class="nav-section-label">트렌드</div>
        <a href="index.html" class="nav-btn">
          <span class="icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </span>
          Dashboard
        </a>
        <a href="feed.html" class="nav-btn">
          <span class="icon">
            <svg viewBox="0 0 24 24"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
          </span>
          트렌드 피드
        </a>
        <a href="categories.html" class="nav-btn active">
          <span class="icon">
            <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </span>
          카테고리 분석
        </a>

        <div class="nav-section-label">기회 분석</div>
        <a href="strategy.html" class="nav-btn">
          <span class="icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          </span>
          전략 설정
        </a>
        <a href="opportunity.html" class="nav-btn">
          <span class="icon">
            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </span>
          기회 상세
        </a>

        <div class="nav-section-label">수익성 검증</div>
        <a href="sourcing.html" class="nav-btn">
          <span class="icon">
            <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          </span>
          소싱 매칭
        </a>
        <a href="margin.html" class="nav-btn">
          <span class="icon">
            <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </span>
          마진 시뮬레이션
        </a>

        <div class="nav-section-label">운영</div>
        <a href="alerts.html" class="nav-btn">
          <span class="icon">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </span>
          알림 센터
          <span class="nav-badge">3</span>
        </a>
        <a href="report.html" class="nav-btn">
          <span class="icon">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </span>
          리포트
        </a>

      </nav>
      <div class="sidebar-bottom">
        <a href="../../index.html" class="sidebar-back-link">
          <span class="icon icon-sm">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </span>
          AutoMarket Home
        </a>
      </div>
    </aside>

    <!-- MAIN AREA -->
    <main class="main-area">
      <div class="page-content">

        <!-- Page heading -->
        <div style="animation: fadeUp 0.4s ease both;">
          <h1 class="page-content-title">카테고리 <span class="accent">분석</span></h1>
          <p class="page-content-sub">8개 주요 카테고리별 트렌드 현황 및 평균 성과 비교</p>
        </div>

        <!-- Category cards grid -->
        <div class="grid-3" id="catGrid">
          <!-- Generated by JS -->
        </div>

        <!-- Horizontal bar chart -->
        <div class="section-card">
          <div class="card-header">
            <div class="card-title">
              <div class="card-title-icon">
                <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              </div>
              카테고리별 평균 기회 점수 비교
            </div>
          </div>
          <div class="card-body" id="scoreChart">
            <!-- Generated by JS -->
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script>
const catData = [
  { name: '패션', color: '#a78bfa', trends: 142, avgScore: 72.3, topKw: '오버사이즈 코트', growth: 24.1 },
  { name: '뷰티', color: '#ff6bca', trends: 208, avgScore: 84.7, topKw: '글로우 세럼', growth: 31.8 },
  { name: '건강/식품', color: '#34d399', trends: 317, avgScore: 88.2, topKw: '건강 간식', growth: 38.2 },
  { name: '가전', color: '#00e5ff', trends: 189, avgScore: 77.9, topKw: '미니 선풍기', growth: 52.1 },
  { name: '생활용품', color: '#f59e0b', trends: 256, avgScore: 81.4, topKw: '미니 가습기', growth: 29.7 },
  { name: '반려동물', color: '#ff6bca', trends: 174, avgScore: 86.1, topKw: '반려동물 간식', growth: 33.8 },
  { name: '주방용품', color: '#a78bfa', trends: 198, avgScore: 75.6, topKw: '실리콘 주방용품', growth: 18.4 },
  { name: '홈/리빙', color: '#00e5ff', trends: 231, avgScore: 79.8, topKw: 'LED 무드등', growth: 22.1 },
];

// Category icons (inline SVG paths keyed by name)
const catIcons = {
  '패션': '<path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/>',
  '뷰티': '<path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/>',
  '건강/식품': '<path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>',
  '가전': '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>',
  '생활용품': '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  '반려동물': '<path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-2.823.47-4.113 6.006-4 7 .08.703 1.725 1.722 3.656 1 1.261-.472 1.96-1.45 2.344-2.5"/><path d="M14.267 5.172c0-1.39 1.577-2.493 3.5-2.172 2.823.47 4.113 6.006 4 7-.08.703-1.725 1.722-3.656 1-1.261-.472-1.96-1.45-2.344-2.5"/><path d="M8 14v.5"/><path d="M16 14v.5"/><path d="M11.25 16.25h1.5L12 17l-.75-.75z"/><path d="M4.42 11.247A13.152 13.152 0 0 0 4 14.556C4 18.728 7.582 21 12 21s8-2.272 8-6.444c0-1.061-.162-2.2-.493-3.309m-9.243-6.082A8.801 8.801 0 0 1 12 5c.78 0 1.5.108 2.161.306"/>',
  '주방용품': '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/>',
  '홈/리빙': '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
};

function scoreColor(s) {
  if (s >= 85) return 'var(--node4)';
  if (s >= 75) return 'var(--warn)';
  return 'var(--danger)';
}

function renderCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = catData.map(c => `
    <div class="cat-card">
      <div class="cat-card-header">
        <span class="cat-card-name" style="color:${c.color};">${c.name}</span>
        <div class="cat-card-icon" style="background:${c.color}22; color:${c.color};">
          <svg viewBox="0 0 24 24">${catIcons[c.name] || catIcons['홈/리빙']}</svg>
        </div>
      </div>
      <div class="cat-big-num" style="color:${c.color};">${c.trends}</div>
      <div class="cat-num-label">트렌드 감지</div>
      <div class="cat-card-meta">
        <div class="cat-meta-row">
          <span class="cat-meta-label">평균 점수</span>
          <span class="cat-meta-val" style="color:${scoreColor(c.avgScore)};">${c.avgScore}</span>
        </div>
        <div class="cat-meta-row">
          <span class="cat-meta-label">대표 키워드</span>
          <span class="cat-meta-kw">${c.topKw}</span>
        </div>
        <div class="cat-meta-row">
          <span class="cat-meta-label">성장률</span>
          <span class="cat-meta-val" style="color:var(--node4);">+${c.growth}%</span>
        </div>
      </div>
    </div>
  `).join('');
}

function renderScoreChart() {
  const container = document.getElementById('scoreChart');
  const sorted = [...catData].sort((a, b) => b.avgScore - a.avgScore);
  const maxScore = 100;
  container.innerHTML = sorted.map(c => `
    <div class="horiz-bar-row">
      <span class="horiz-bar-label">${c.name}</span>
      <div class="horiz-bar-track">
        <div class="horiz-bar-fill" style="width:${(c.avgScore / maxScore * 100).toFixed(1)}%; background:${c.color};"></div>
      </div>
      <span class="horiz-bar-val" style="color:${scoreColor(c.avgScore)};">${c.avgScore}</span>
    </div>
  `).join('');
}

renderCatGrid();
renderScoreChart();
</script>
</body>
</html>
