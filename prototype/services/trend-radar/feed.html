<style>
/* ── PAGE-SPECIFIC STYLES ── */

/* Sidebar uses <a> tags styled as nav-btn */
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  border: none; background: transparent; color: var(--text-secondary);
  font-family: 'Outfit', 'Noto Sans KR', sans-serif;
  font-size: 13.5px; font-weight: 500; cursor: pointer;
  transition: all 0.18s; text-align: left; width: 100%;
  position: relative; border-left: 2px solid transparent;
  text-decoration: none;
}
.nav-btn:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
.nav-btn.active { background: rgba(0,229,255,0.08); color: var(--node1); border-left-color: var(--node1); font-weight: 600; }
.nav-btn .icon { width: 20px; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: rgba(248,113,113,0.15);
  border: 1px solid rgba(248,113,113,0.25); color: var(--danger);
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 10px; font-family: 'JetBrains Mono', monospace;
}

/* Feed page layout */
.feed-page { padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; flex: 1; }

/* Page title */
.page-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1.1; }
.page-title .accent { color: var(--node1); }
.page-subtitle { font-size: 13.5px; color: var(--text-secondary); margin-top: 6px; line-height: 1.6; }

/* Toolbar */
.feed-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  animation: fadeUp 0.4s 0.1s ease both;
}
.source-tabs {
  display: flex; gap: 4px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 3px;
}
.source-tab {
  padding: 5px 13px; border-radius: 5px; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; color: var(--text-muted);
  border: none; background: none; font-family: 'Outfit', 'Noto Sans KR', sans-serif;
}
.source-tab.active { background: var(--node1); color: var(--bg-deep); }
.source-tab:not(.active):hover { color: var(--text-secondary); background: rgba(255,255,255,0.04); }

.toolbar-right { display: flex; align-items: center; gap: 12px; }

.refresh-indicator {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}
.refresh-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--node4); flex-shrink: 0;
  animation: pulse-green 2s infinite;
}
@keyframes pulse-green {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
  50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(52,211,153,0); }
}
.countdown-num { color: var(--node4); font-weight: 700; }

.refresh-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text-secondary); font-family: 'Outfit', sans-serif;
  font-size: 12.5px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--node1); color: var(--node1); background: var(--node1-dim); }
.refresh-btn .icon { color: inherit; }

/* Section card */
.section-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  animation: fadeUp 0.45s 0.15s ease both;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.card-title {
  font-size: 14px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.card-title-icon {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--node1-dim); display: flex; align-items: center; justify-content: center;
  color: var(--node1); flex-shrink: 0;
}
.card-title-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.card-count {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-muted); padding: 3px 10px;
  background: var(--bg-surface); border-radius: 20px; border: 1px solid var(--border);
}

/* Feed table */
.feed-table { width: 100%; border-collapse: collapse; }
.feed-table th {
  padding: 11px 14px; text-align: left;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
  background: var(--bg-surface); border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.feed-table th:first-child { padding-left: 20px; }
.feed-table th:last-child { padding-right: 20px; text-align: right; }
.feed-table td {
  padding: 11px 14px; border-bottom: 1px solid rgba(30,41,59,0.5);
  font-size: 13px; vertical-align: middle;
}
.feed-table td:first-child { padding-left: 20px; }
.feed-table td:last-child { padding-right: 20px; text-align: right; }
.feed-table tr:last-child td { border-bottom: none; }
.feed-table tr { transition: background 0.15s; }
.feed-table tr:hover td { background: rgba(0,229,255,0.025); }

/* Time cell */
.time-cell {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text-muted);
  white-space: nowrap;
}

/* Keyword cell */
.kw-cell { display: flex; align-items: center; gap: 8px; }
.kw-text { font-weight: 600; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; }
.kw-badge {
  font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;
}
.badge-new { background: rgba(245,158,11,0.14); color: var(--warn); border: 1px solid rgba(245,158,11,0.25); }
.badge-hot { background: rgba(248,113,113,0.13); color: var(--danger); border: 1px solid rgba(248,113,113,0.22); }
.badge-rise { background: rgba(52,211,153,0.12); color: var(--node4); border: 1px solid rgba(52,211,153,0.22); }

/* Source badge */
.source-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
}
.src-naver  { background: rgba(3,199,90,0.1);   color: #03c75a; border: 1px solid rgba(3,199,90,0.22); }
.src-coupang { background: rgba(238,40,40,0.1);  color: #ee2828; border: 1px solid rgba(238,40,40,0.22); }
.src-insta  { background: rgba(193,53,132,0.1);  color: #c13584; border: 1px solid rgba(193,53,132,0.22); }
.src-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* Score badge */
.score-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 38px; height: 24px; border-radius: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
}
.score-high { background: rgba(52,211,153,0.14); color: var(--node4); border: 1px solid rgba(52,211,153,0.24); }
.score-mid  { background: rgba(245,158,11,0.12);  color: var(--warn);  border: 1px solid rgba(245,158,11,0.22); }
.score-low  { background: rgba(248,113,113,0.1);  color: var(--danger); border: 1px solid rgba(248,113,113,0.2); }

/* Volume cell */
.vol-cell { display: flex; align-items: center; gap: 7px; justify-content: flex-end; }
.vol-bar-track { width: 60px; height: 4px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; }
.vol-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--node1), rgba(0,229,255,0.45)); }
.vol-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); min-width: 42px; text-align: right; }

/* Change rate cell */
.change-cell { display: flex; align-items: center; gap: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; justify-content: flex-end; }
.change-up   { color: var(--node4); }
.change-down { color: var(--danger); }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

<script>

];

function srcClass(src) {
  if (src === 'naver')   return 'src-naver';
  if (src === 'coupang') return 'src-coupang';
  if (src === 'insta')   return 'src-insta';
  return '';
}
function srcLabel(src) {
  if (src === 'naver')   return '네이버';
  if (src === 'coupang') return '쿠팡';
  if (src === 'insta')   return '인스타';
  return src;
}
function scoreClass(s) {
  if (s >= 80) return 'score-high';
  if (s >= 60) return 'score-mid';
  return 'score-low';
}
function badgeHtml(b) {
  if (!b) return '';
  const map = { hot: 'badge-hot', new: 'badge-new', rise: 'badge-rise' };
  const label = { hot: 'HOT', new: 'NEW', rise: 'RISE' };
  return `<span class="kw-badge ${map[b]}">${label[b]}</span>`;
}

function renderRows(data) {
  const tbody = document.getElementById('feedBody');
  tbody.innerHTML = data.map(row => {
    const changeDir = row.change >= 0 ? 'change-up' : 'change-down';
    const arrowSvg = row.change >= 0
      ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>`
      : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
    const volFormatted = row.vol >= 1000 ? (row.vol / 1000).toFixed(1) + 'K' : row.vol;
    return `<tr>
      <td><span class="time-cell">${row.time}</span></td>
      <td>
        <div class="kw-cell">
          <span class="kw-text">${row.keyword}</span>
          ${badgeHtml(row.badge)}
        </div>
      </td>
      <td>
        <span class="source-badge ${srcClass(row.src)}">
          <span class="src-dot"></span>${srcLabel(row.src)}
        </span>
      </td>
      <td><span class="score-badge ${scoreClass(row.score)}">${row.score}</span></td>
      <td>
        <div class="vol-cell">
          <div class="vol-bar-track"><div class="vol-bar-fill" style="width:${row.volPct}%"></div></div>
          <span class="vol-text">${volFormatted}</span>
        </div>
      </td>
      <td>
        <div class="change-cell ${changeDir}">
          ${arrowSvg}
          ${row.change >= 0 ? '+' : ''}${row.change.toFixed(1)}%
        </div>
      </td>
    </tr>`;
  }).join('');
}

// Source tab filter
let activeSrc = 'all';
document.getElementById('sourceTabs').addEventListener('click', e => {
  const btn = e.target.closest('.source-tab');
  if (!btn) return;
  document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeSrc = btn.dataset.src;
  const filtered = activeSrc === 'all' ? feedData : feedData.filter(r => r.src === activeSrc);
  renderRows(filtered);
  document.getElementById('cardCount').textContent = filtered.length + ' / 1,840 entries';
});

// Countdown timer
let seconds = 30;
function tick() {
  seconds--;
  if (seconds <= 0) {
    seconds = 30;
    renderRows(activeSrc === 'all' ? feedData : feedData.filter(r => r.src === activeSrc));
  }
  document.getElementById('countdown').textContent = seconds;
}
setInterval(tick, 1000);

// Manual refresh button
document.getElementById('refreshBtn').addEventListener('click', () => {
  seconds = 30;
  document.getElementById('countdown').textContent = seconds;
  renderRows(activeSrc === 'all' ? feedData : feedData.filter(r => r.src === activeSrc));
});

// Initial render
renderRows(feedData);
</script>
</body>
</html>
